<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f7fb;">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            Employee Management System
        </a>

        <div>
            {% if user.is_authenticated %}
                <span class="text-white me-3">Hi, {{ user.username }}</span>
                <a href="{% url 'add_employee' %}" class="btn btn-success btn-sm">+ Add Employee</a>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm ms-2">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Login</a>
                <a href="{% url 'register' %}" class="btn btn-success btn-sm ms-2">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
